syntax = "proto3";

package trading;

option go_package = "github.com/supanut9/trading-bot/proto/trading";

service StrategyService {
    rpc GetSignal (CandleRequest) returns (SignalResponse);
}

message CandleRequest {
    string symbol = 1;
    string timeframe = 2;
    double open = 3;
    double high = 4;
    double low = 5;
    double close = 6;
    double volume = 7;
    string timestamp = 8;
}

message SignalResponse {
    string symbol = 1;
    string side = 2; // "BUY", "SELL", "NONE"
    double size = 3;
}
